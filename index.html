<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vegetable Oils Market Report | June 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
<style>
/* === CRITICAL: Instant paint, no variables, no external fonts === */
html, body {
  margin: 0;
  padding: 0;
  background: #ffffff !important;
  color: #000000 !important;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif !important;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.5;
  font-size: 14px;
  opacity: 1 !important;
  visibility: visible !important;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

.container { max-width: 720px; margin: 0 auto; padding: 12px; }

/* Header */
.header {
  padding: 16px 12px;
  border-bottom: 1px solid #e5e7eb;
  margin-bottom: 16px;
}
.header h1 {
  font-size: 18px;
  font-weight: 700;
  margin: 0 0 4px;
  color: #000;
}
.header-sub {
  font-size: 13px;
  color: #6b7280;
  margin-bottom: 8px;
}
.header-date {
  font-size: 12px;
  color: #9ca3af;
  font-weight: 500;
}
.lang-switch {
  display: flex;
  gap: 6px;
  margin-top: 8px;
}
.lang-btn {
  background: #f3f4f6;
  border: 1px solid #d1d5db;
  color: #374151;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}
.lang-btn.active {
  background: #000;
  color: #fff;
  border-color: #000;
}

/* Sections */
.section {
  margin-bottom: 20px;
  padding: 16px;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  background: #fff;
}
.section-title {
  font-size: 15px;
  font-weight: 700;
  color: #000;
  margin: 0 0 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid #e5e7eb;
}

/* Summary */
.summary {
  background: #f9fafb;
  border-left: 3px solid #6b7280;
  padding: 12px;
  margin-bottom: 14px;
  font-size: 13px;
  color: #374151;
  line-height: 1.6;
}

/* Trends */
.trends {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}
.trend {
  padding: 12px;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
}
.trend-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  margin-bottom: 6px;
}
.badge-down { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
.badge-up { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
.badge-neutral { background: #f3f4f6; color: #6b7280; border: 1px solid #d1d5db; }
.trend-title {
  font-weight: 700;
  font-size: 13px;
  color: #000;
  margin-bottom: 4px;
}
.trend-text {
  font-size: 12px;
  color: #6b7280;
  line-height: 1.5;
}

/* Charts */
.chart-box {
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  padding: 12px;
  margin: 14px 0;
  height: 220px;
  background: #fff;
}

/* Tables */
.table-wrap {
  overflow-x: auto;
  margin: 12px 0;
  border: 1px solid #e5e7eb;
  border-radius: 6px;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  min-width: 480px;
}
th {
  background: #f9fafb;
  color: #374151;
  font-weight: 600;
  text-align: left;
  padding: 10px;
  border-bottom: 1px solid #e5e7eb;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
td {
  padding: 10px;
  border-bottom: 1px solid #e5e7eb;
  color: #000;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #f9fafb; }

.price-change {
  font-weight: 600;
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 4px;
  display: inline-block;
}
.price-down { background: #fef2f2; color: #dc2626; }
.price-up { background: #f0fdf4; color: #16a34a; }

/* Regions */
.regions {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-top: 12px;
}
.region-card {
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  padding: 12px;
  background: #fff;
}
.region-card h3 {
  font-size: 13px;
  font-weight: 700;
  color: #000;
  margin: 0 0 6px;
}
.region-card p {
  font-size: 12px;
  color: #6b7280;
  line-height: 1.5;
  margin: 0;
}
.region-card strong { color: #000; }

/* Logistics compare */
.logistics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 14px 0;
}
.log-card {
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  padding: 14px;
  text-align: center;
  background: #fff;
}
.log-card.primary {
  border-color: #000;
  background: #f9fafb;
}
.log-card h3 {
  font-size: 13px;
  font-weight: 700;
  margin: 0 0 10px;
  color: #000;
}
.log-metric { margin: 8px 0; }
.log-label {
  font-size: 10px;
  color: #9ca3af;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.log-value {
  font-size: 18px;
  font-weight: 700;
  color: #000;
}
.log-note {
  font-size: 11px;
  color: #6b7280;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed #e5e7eb;
}

/* Footer */
.footer {
  text-align: center;
  padding: 20px 0;
  color: #9ca3af;
  font-size: 11px;
  border-top: 1px solid #e5e7eb;
  margin-top: 16px;
}

/* Mobile */
@media (max-width: 600px) {
  .logistics { grid-template-columns: 1fr; }
  .header { padding: 12px; }
  .section { padding: 14px; }
  table { min-width: 100%; }
}
</style>
</head>

<script>
// Telegram init (non-blocking)
if(window.Telegram && window.Telegram.WebApp){
  window.Telegram.WebApp.ready();
  window.Telegram.WebApp.expand();
}

let currentLang = 'en';
function switchLang(lang){
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.querySelectorAll('[data-en][data-ru]').forEach(el => {
    if(el.tagName === 'CANVAS') return;
    el.textContent = el.getAttribute(`data-${lang}`);
  });
  updateCharts(lang);
}

// Wait for DOM + Chart.js
document.addEventListener('DOMContentLoaded', function(){
  Chart.defaults.color = '#6b7280';
  Chart.defaults.borderColor = '#e5e7eb';
  Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';

  const cpoChart = new Chart(document.getElementById('cpoChart'), {
    type: 'line',
    data: {
      labels: ['Jun 15', 'Jul 15'],
      datasets: [{ label: 'CPO (RM/t)', data: [4470, 4435], borderColor: '#000', backgroundColor: 'rgba(0,0,0,0.05)', borderWidth: 2, tension: 0.3, fill: true, pointRadius: 3, pointBackgroundColor: '#fff', pointBorderColor: '#000' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#000', font: { size: 10 } } } },
      scales: {
        y: { min: 4400, max: 4500, grid: { color: '#f3f4f6' }, ticks: { color: '#6b7280' } },
        x: { grid: { display: false }, ticks: { color: '#6b7280' } }
      }
    }
  });

  const priceChart = new Chart(document.getElementById('priceChart'), {
    type: 'bar',
    data: {
      labels: ['Palm', 'Soybean', 'Sunflower', 'Rapeseed'],
      datasets: [{ label: 'USD/t', data: [1000, 1600, 1325, 1325], backgroundColor: ['#000', '#6b7280', '#9ca3af', '#d1d5db'], borderRadius: 4, borderSkipped: false }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { grid: { color: '#f3f4f6' }, ticks: { color: '#6b7280', callback: v => '$'+v } },
        x: { grid: { display: false }, ticks: { color: '#6b7280' } }
      }
    }
  });

  window.updateCharts = function(lang){
    cpoChart.data.datasets[0].label = lang==='ru'?'CPO (RM/т)':'CPO (RM/t)';
    priceChart.data.datasets[0].label = lang==='ru'?'USD/т':'USD/t';
    priceChart.data.labels = lang==='ru'?['Пальмовое','Соевое','Подсолнечное','Рапсовое']:['Palm','Soybean','Sunflower','Rapeseed'];
    cpoChart.update(); priceChart.update();
  }
});
</script>
</body>
</html>
