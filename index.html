<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Market Intelligence Report | June 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #0b0c10;
            --bg-surface: #121418;
            --bg-card: #181a1f;
            --bg-hover: #1f2228;
            --border: #2a2d35;
            --text-primary: #e8eaed;
            --text-secondary: #9aa0a6;
            --text-muted: #5f6368;
            --accent: #4a5568;
            --accent-border: #3d4654;
            --status-green: #2e7d32;
            --status-bg-green: rgba(46, 125, 50, 0.15);
            --status-red: #c62828;
            --status-bg-red: rgba(198, 40, 40, 0.15);
            --status-amber: #b45309;
            --status-bg-amber: rgba(180, 83, 9, 0.15);
            --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --radius: 6px;
            --shadow: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: var(--font);
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
            font-size: 14px;
            padding: 0;
        }

        .container { max-width: 850px; margin: 0 auto; padding: 16px; }
        
        /* Header */
        .header {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; color: var(--text-primary); }
        .header-meta { display: flex; flex-direction: column; gap: 4px; text-align: right; }
        .header-sub { color: var(--text-secondary); font-size: 13px; }
        .header-date { color: var(--text-muted); font-size: 12px; font-weight: 500; }
        .lang-switch { display: flex; gap: 6px; margin-top: 4px; justify-content: flex-end; }
        .lang-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .lang-btn.active { background: var(--bg-hover); color: var(--text-primary); border-color: var(--accent-border); }

        /* Sections */
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.2px;
        }
        .section-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* Summary & Trends */
        .exec-summary {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
        }
        .trend-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
        .trend-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            transition: border-color 0.2s;
        }
        .trend-card:hover { border-color: var(--accent-border); }
        .trend-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }
        .badge-bearish { background: var(--status-bg-red); color: var(--status-red); border: 1px solid rgba(198,40,40,0.3); }
        .badge-warning { background: var(--status-bg-amber); color: var(--status-amber); border: 1px solid rgba(180,83,9,0.3); }
        .badge-bullish { background: var(--status-bg-green); color: var(--status-green); border: 1px solid rgba(46,125,50,0.3); }
        .badge-neutral { background: var(--bg-hover); color: var(--text-secondary); border: 1px solid var(--border); }
        .trend-title { font-weight: 600; color: var(--text-primary); margin-bottom: 6px; font-size: 13px; }
        .trend-text { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

        /* Charts & Tables */
        .chart-wrapper {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            margin: 14px 0;
            position: relative;
            height: 260px;
        }
        .data-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 12px; }
        .data-table th, .data-table td { padding: 10px 8px; text-align: left; border-bottom: 1px solid var(--border); }
        .data-table th { color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; background: transparent; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: var(--bg-hover); }
        
        .price-change { padding: 2px 6px; border-radius: 3px; font-weight: 600; font-size: 11px; }
        .price-down { background: var(--status-bg-red); color: var(--status-red); }
        .price-up { background: var(--status-bg-green); color: var(--status-green); }

        /* Regions & Cards */
        .region-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-top: 14px; }
        .region-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
        .region-card h3 { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; border-left: 2px solid var(--accent); padding-left: 8px; }
        .region-card p { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
        
        .highlight-box {
            background: var(--bg-surface);
            border-left: 3px solid var(--accent);
            padding: 12px;
            border-radius: 0 var(--radius) var(--radius) 0;
            margin: 12px 0;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .highlight-box strong { color: var(--text-primary); font-weight: 600; }

        /* Logistics Compare */
        .logistics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin: 16px 0; }
        .logistics-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
        .logistics-card.primary { border-color: var(--accent-border); background: linear-gradient(180deg, var(--bg-hover) 0%, var(--bg-surface) 100%); }
        .logistics-card h3 { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--text-primary); }
        .logistics-metric { font-size: 22px; font-weight: 700; color: var(--text-primary); margin: 4px 0; letter-spacing: -0.5px; }
        .logistics-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .logistics-note { font-size: 11px; color: var(--text-secondary); margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }

        /* Footer */
        .footer { text-align: center; padding: 20px 0; color: var(--text-muted); font-size: 11px; border-top: 1px solid var(--border); margin-top: 16px; }

        @media (max-width: 600px) {
            .header { flex-direction: column; align-items: flex-start; }
            .header-meta { text-align: left; }
            .section { padding: 16px; }
            .trend-grid, .region-grid, .logistics-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 data-en="📊 Vegetable Oils & Fats Market Report" data-ru="📊 Отчет: Рынок растительных масел и жиров"></h1>
                <div class="header-sub" data-en="Regional Coverage: EU-27, UK, Balkans, Central Asia, Caucasus" data-ru="География: ЕС-27, Великобритания, Балканы, ЦА, Кавказ"></div>
            </div>
            <div class="header-meta">
                <div class="header-date" data-en="📅 June 7 – 14, 2026" data-ru="📅 7 – 14 июня 2026"></div>
                <div class="lang-switch">
                    <button class="lang-btn active" onclick="switchLang('en')">EN</button>
                    <button class="lang-btn" onclick="switchLang('ru')">RU</button>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title" data-en="I. Executive Summary" data-ru="I. Краткое содержание"></div>
            <div class="exec-summary">
                <span data-en="In June 2026, the vegetable oil market shows a pronounced correction due to oversupply from South America and active Asian export policies. For Central Asia and Caucasus, the key trend is shifting from simple processing to deep global integration requiring strict EUDR compliance." 
                      data-ru="В июне 2026 года рынок демонстрирует коррекцию из-за переизбытка из Южной Америки и активной экспортной политики Азии. Для ЦА и Кавказа ключевой тренд — переход от простой переработки к глубокой интеграции в цепочки, требующей строгого соблюдения EUDR."></span>
            </div>
            <div class="trend-grid">
                <div class="trend-card">
                    <span class="trend-badge badge-bearish" data-en="▼ Bearish" data-ru="▼ Медвежий"></span>
                    <div class="trend-title" data-en="Global Price Normalization" data-ru="Глобальная нормализация цен"></div>
                    <div class="trend-text" data-en="Shift towards bearish trend in palm/soy oils due to record SA harvests and Indonesia policy adjustments." data-ru="Сдвиг к медвежьему тренду по пальмовому/соевому маслу из-за рекордных урожаев в ЮА и корректировок политики Индонезии."></div>
                </div>
                <div class="trend-card">
                    <span class="trend-badge badge-warning" data-en="⚠ Risk Premium" data-ru="⚠ Премия за риск"></span>
                    <div class="trend-title" data-en="Logistics Risk Premium" data-ru="Логистическая премия за риск"></div>
                    <div class="trend-text" data-en="Persistent divergence between high Black Sea delivery costs and optimism over RU/UA harvest forecasts." data-ru="Разрыв между высокими затратами на доставку в Черном море и оптимизмом по урожаям РФ/Украина."></div>
                </div>
                <div class="trend-card">
                    <span class="trend-badge badge-bullish" data-en="▲ Transformation" data-ru="▲ Трансформация"></span>
                    <div class="trend-title" data-en="Regional Industrial Transformation" data-ru="Региональная трансформация"></div>
                    <div class="trend-text" data-en="CA & Caucasus pivot from import dependency to localized value-added processing (refined oil, meal)." data-ru="ЦА и Кавказ переходят от импорта к локализованной переработке с добавленной стоимостью."></div>
                </div>
                <div class="trend-card">
                    <span class="trend-badge badge-neutral" data-en="🔒 Compliance" data-ru="🔒 Регуляторный барьер"></span>
                    <div class="trend-title" data-en="Compliance as Market Barrier" data-ru="Соответствие как барьер"></div>
                    <div class="trend-text" data-en="EUDR and RED III create 'regulatory filter' where traceability and ISCC certification are essential for EU markets." data-ru="EUDR и RED III создают фильтр, где прослеживаемость и ISCC обязательны для рынков ЕС."></div>
                </div>
                <div class="trend-card">
                    <span class="trend-badge badge-bullish" data-en="🚛 Diversification" data-ru="🚛 Диверсификация"></span>
                    <div class="trend-title" data-en="Strategic Logistics Diversification" data-ru="Логистическая диверсификация"></div>
                    <div class="trend-text" data-en="Increased reliance on Trans-Caspian route (TITR) as critical response to geopolitical instability." data-ru="Рост зависимости от Транскаспийского маршрута (TITR) как реакции на геополитическую нестабильность."></div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title" data-en="II. Pricing Dynamics" data-ru="II. Динамика цен"></div>
            <div class="highlight-box">
                <strong data-en="Physical Market (FOB, June 15, 2026):" data-ru="Физический рынок (FOB, 15.06.2026):"></strong>
                <span data-en="Global downward pressure on prices due to record South American harvests and Indonesian regulatory changes." 
                      data-ru="Глобальное понижающее давление из-за рекордных урожаев в Южной Америке и регуляторных изменений в Индонезии."></span>
            </div>
            
            <div class="chart-wrapper"><canvas id="cpoChart"></canvas></div>
            <table class="data-table">
                <thead><tr><th data-en="Contract" data-ru="Контракт"></th><th data-en="Expiration" data-ru="Истечение"></th><th data-en="Price (RM/t)" data-ru="Цена (RM/т)"></th><th data-en="Change" data-ru="Δ"></th></tr></thead>
                <tbody>
                    <tr><td data-en="June 2026" data-ru="Июнь 2026"></td><td>2026-06-15</td><td>4,470</td><td><span class="price-change price-down">-1.11%</span></td></tr>
                    <tr><td data-en="July 2026" data-ru="Июль 2026"></td><td>2026-07-15</td><td>4,435</td><td><span class="price-change price-down">-0.95%</span></td></tr>
                </tbody>
            </table>

            <div class="chart-wrapper"><canvas id="priceChart"></canvas></div>
            <table class="data-table">
                <thead><tr><th data-en="Oil Type" data-ru="Тип масла"></th><th data-en="Delivery Basis" data-ru="Базис"></th><th data-en="Price (USD/t)" data-ru="Цена (USD/т)"></th></tr></thead>
                <tbody>
                    <tr><td><strong data-en="Crude Palm Oil" data-ru="Сырое пальмовое"></strong></td><td data-en="FOB Malaysia" data-ru="FOB Малайзия"></td><td>$980 – $1,020</td></tr>
                    <tr><td data-en="Soybean Oil" data-ru="Соевое"></td><td data-en="FOB Brazil/Argentina" data-ru="FOB Бразилия/Аргентина"></td><td>$1,580 – $1,620</td></tr>
                    <tr><td data-en="Sunflower Oil" data-ru="Подсолнечное"></td><td data-en="FOB Black Sea" data-ru="FOB Черное море"></td><td>$1,300 – $1,350</td></tr>
                    <tr><td data-en="Rapeseed Oil" data-ru="Рапсовое"></td><td data-en="FOB Rotterdam" data-ru="FOB Роттердам"></td><td>$1,310 – $1,340</td></tr>
                </tbody>
            </table>
            <div class="highlight-box">
                <strong data-en="POGO Spread:" data-ru="Спред POGO:"></strong>
                <span data-en="Remains in discount zone at -$21.90, stimulating HVO feedstock purchases post-Malaysia B15 launch." 
                      data-ru="Остается в зоне дисконта -$21.90, стимулируя закупки сырья для HVO после запуска B15."></span>
            </div>
        </div>

        <div class="section">
            <div class="section-title" data-en="III. Regional Analysis" data-ru="III. Региональный анализ"></div>
            <div class="region-grid">
                <div class="region-card">
                    <h3 data-en="🇩🇪 Germany" data-ru="🇩🇪 Германия"></h3>
                    <p data-en="Key HVO consumer. Stable acreage. Growing demand for UCO & technical fats. Trend towards cold-pressed oils." data-ru="Ключевой потребитель HVO. Стабильные площади. Рост спроса на UCO и тех. жиры. Тренд на масла холодного отжима."></p>
                </div>
                <div class="region-card">
                    <h3 data-en="🇳🇱 Netherlands" data-ru="🇳🇱 Нидерланды"></h3>
                    <p data-en="Primary EU logistics hub. Active EUDR preparation. Rising non-GMO demand requiring LATAM/SEA compliance." data-ru="Основной хаб ЕС. Подготовка к EUDR. Рост спроса на non-GMO, требующий соответствия поставщиков."></p>
                </div>
                <div class="region-card">
                    <h3 data-en="🇬🇧 United Kingdom" data-ru="🇬🇧 Великобритания"></h3>
                    <p data-en="Rapeseed acreage +14-15% (2026/27). Output >1M tonnes. RTFO limits food-grade oils in biofuel to 3%." data-ru="Площади рапса +14-15%. Производство >1 млн т. RTFO ограничивает пищевые масла в биотопливе до 3%."></p>
                </div>
                <div class="region-card">
                    <h3 data-en="🇮🇹 Italy" data-ru="🇮🇹 Италия"></h3>
                    <p data-en="Transition to waste-based feedstocks (UCO, residues) per RED III. Reducing reliance on food-grade palm oil." data-ru="Переход на сырье из отходов (UCO) по RED III. Снижение зависимости от пищевого пальмового масла."></p>
                </div>
                <div class="region-card">
                    <h3 data-en="🇵🇱 Poland" data-ru="🇵🇱 Польша"></h3>
                    <p data-en="June rain improved winter rapeseed outlook. Yield recovery projected, cautious on input cost fluctuations." data-ru="Июньские дожди улучшили прогноз по рапсу. Прогнозируется восстановление урожайности."></p>
                </div>
                <div class="region-card">
                    <h3 data-en="🇨🇿 Czech Republic" data-ru="🇨🇿 Чехия"></h3>
                    <p data-en="Stricter spread labeling. Retail chains segregating vegetable spreads from animal butter for transparency." data-ru="Строгая маркировка спредов. Ритейлеры разделяют растительные и животные жиры на полках."></p>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title" data-en="IV. Black Sea & CA/Caucasus" data-ru="IV. Черное море и ЦА/Кавказ"></div>
            <div class="highlight-box">
                <strong data-en="EU-27 Oilseed (2026/27):" data-ru="Масличные ЕС-27 (2026/27):"></strong>
                <span data-en="Projected 32.3M tonnes (+3.3%). Domestic processing up, crude import dependence -25% vs 5-yr avg." 
                      data-ru="Прогноз 32,3 млн т (+3,3%). Внутренняя переработка растет, зависимость от импорта сырья -25%."></span>
            </div>
            <div class="region-grid">
                <div class="region-card">
                    <h3 data-en="🇺🇦 Ukraine" data-ru="🇺🇦 Украина"></h3>
                    <p><strong data-en="Prod:" data-ru="Произв.:"></strong> 13.5M t sunflower (+23%)<br>
                    <strong data-en="Export:" data-ru="Экспорт:"></strong> 5.1M t oil (+16.6%)<br>
                    <span data-en="Maintaining global exporter status via maritime corridors." data-ru="Сохранение статуса глобального экспортера через морские коридоры."></span></p>
                </div>
                <div class="region-card">
                    <h3 data-en="🇷🇺 Russia" data-ru="🇷🇺 Россия"></h3>
                    <p><strong data-en="Prod:" data-ru="Произв.:"></strong> 19.2M t sunflower (+10%)<br>
                    <strong data-en="Duty:" data-ru="Пошлина:"></strong> 1,337.5 RUB/t<br>
                    <span data-en="Diversifying exports to India/China. 'Damper' limits crude outflows." data-ru="Диверсификация в Индию/Китай. 'Демпфер' ограничивает вывоз сырья."></span></p>
                </div>
                <div class="region-card">
                    <h3 data-en="🇰🇿 Kazakhstan" data-ru="🇰🇿 Казахстан"></h3>
                    <p data-en="Record revenues ~$963M. First Aktau marine shipments (2026). Shift to finished oil/meal exports, focus on China/CA." data-ru="Доходы ~$963 млн. Первые отгрузки из Актау (2026). Переход к экспорту готового масла/шрота."></p>
                </div>
                <div class="region-card">
                    <h3 data-en="🇺🇿 Uzbekistan" data-ru="🇺🇿 Узбекистан"></h3>
                    <p data-en="Q1 2026 refined output +11%. Adopting energy-saving tech & extraction optimization for climate adaptation." data-ru="Q1 2026 выпуск раф. масла +11%. Внедрение энергосберегающих технологий экстракции."></p>
                </div>
                <div class="region-card">
                    <h3 data-en="🇦🇿 Azerbaijan" data-ru="🇦🇿 Азербайджан"></h3>
                    <p data-en="Strong agri-export growth H1 2026. Utilizing capacities to reduce import dependence on food fats." data-ru="Рост агроэкспорта в H1 2026. Использование мощностей для снижения импорта пищевых жиров."></p>
                </div>
                <div class="region-card">
                    <h3 data-en="🇬🇪 Georgia" data-ru="🇬🇪 Грузия"></h3>
                    <p data-en="Key transit hub. Significant growth in oil transshipment via Kulevi port. Integrating into global chains." data-ru="Ключевой транзитный хаб. Рост перевалки через порт Кулеви. Интеграция в глобальные цепочки."></p>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title" data-en="V. Regulatory & Logistics" data-ru="V. Регуляторика и Логистика"></div>
            <div class="highlight-box">
                <strong data-en="EUDR Deadlines:" data-ru="Сроки EUDR:"></strong>
                <span data-en="Large: Dec 30, 2026 | SMEs: Jun 30, 2027. Geolocation & ISCC mandatory for EU access." 
                      data-ru="Крупные: 30.12.2026 | МСП: 30.06.2027. Геолокация и ISCC обязательны для доступа в ЕС."></span>
            </div>

            <div class="logistics-grid">
                <div class="logistics-card primary">
                    <h3 data-en="🚛 TITR (Middle Corridor)" data-ru="🚛 TITR (Средний коридор)"></h3>
                    <div class="logistics-label" data-en="TRANSIT TIME" data-ru="ВРЕМЯ ТРАНЗИТА"></div>
                    <div class="logistics-metric">15-19 d</div>
                    <div class="logistics-label" data-en="FREIGHT RATE" data-ru="ФРАХТ"></div>
                    <div class="logistics-metric">$3.5k-4.5k</div>
                    <div class="logistics-note" data-en="Standard insurance. Risk: Customs delays." data-ru="Стандартное страхование. Риск: Таможня."></div>
                </div>
                <div class="logistics-card">
                    <h3 data-en="🚢 Black Sea Route" data-ru="🚢 Черноморский маршрут"></h3>
                    <div class="logistics-label" data-en="TRANSIT TIME" data-ru="ВРЕМЯ ТРАНЗИТА"></div>
                    <div class="logistics-metric">37-45 d</div>
                    <div class="logistics-label" data-en="FREIGHT RATE" data-ru="ФРАХТ"></div>
                    <div class="logistics-metric">$10,000</div>
                    <div class="logistics-note" data-en="1% hull premium. Risk: UAVs, mines." data-ru="Премия 1% корпуса. Риск: БПЛА, мины."></div>
                </div>
            </div>
            <div class="highlight-box">
                <strong data-en="✅ Digitalization:" data-ru="✅ Цифровизация:"></strong>
                <span data-en="April 24, 2026 roadmap successfully mitigated delays at Aktau/Baku via electronic data exchange." 
                      data-ru="Дорожная карта от 24.04.2026 смягчила задержки в Актау/Баку через электронный обмен данными."></span>
            </div>

        <div class="footer">
            <p data-en="© 2026 Market Intelligence Group" data-ru="© 2026 Аналитическая группа"></p>
            <p style="margin-top:4px; opacity:0.6;" data-en="Sources: USDA, EC DG AGRI, National Stats, Industry Experts" data-ru="Источники: USDA, EC DG AGRI, Нац. статистика, Эксперты отрасли"></p>
        </div>
    </div>

    <script>
        let currentLang = 'en';
        
        function switchLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('[data-en][data-ru]').forEach(el => {
                el.textContent = el.getAttribute(`data-${lang}`);
            });
            updateCharts(lang);
        }
        
        Chart.defaults.color = '#9aa0a6';
        Chart.defaults.borderColor = '#2a2d35';
        Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif';

        const cpoChart = new Chart(document.getElementById('cpoChart'), {
            type: 'line',
            data: {
                labels: ['Jun 15', 'Jul 15'],
                datasets: [{
                    label: 'CPO (RM/t)',
                    data: [4470, 4435],
                    borderColor: '#718096',
                    backgroundColor: 'rgba(113,128,150,0.1)',
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true,
                    pointRadius: 4,
                    pointBackgroundColor: '#181a1f',
                    pointBorderColor: '#9aa0a6',
                    pointBorderWidth: 2
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#e8eaed', font: { size: 11 } } } },
                scales: { y: { min: 4400, max: 4500, grid: { color: '#1f2228' }, ticks: { color: '#9aa0a6' } }, x: { grid: { display: false } } }
            }
        });

        const priceChart = new Chart(document.getElementById('priceChart'), {
            type: 'bar',
            data: {
                labels: ['Palm', 'Soybean', 'Sunflower', 'Rapeseed'],
                datasets: [{
                    label: 'USD/t',
                    data: [1000, 1600, 1325, 1325],
                    backgroundColor: ['#4a5568', '#718096', '#9aa0a6', '#c5cad1'],
                    borderRadius: 4,
                    borderSkipped: false
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { grid: { color: '#1f2228' }, ticks: { color: '#9aa0a6', callback: v => '$'+v } }, x: { grid: { display: false }, ticks: { color: '#9aa0a6' } } }
            }
        });
        
        function updateCharts(lang) {
            cpoChart.data.datasets[0].label = lang === 'ru' ? 'CPO (RM/т)' : 'CPO (RM/t)';
            priceChart.data.datasets[0].label = lang === 'ru' ? 'USD/т' : 'USD/t';
            priceChart.data.labels = lang === 'ru' ? ['Пальмовое', 'Соевое', 'Подсолнечное', 'Рапсовое'] : ['Palm', 'Soybean', 'Sunflower', 'Rapeseed'];
            cpoChart.update(); priceChart.update();
        }

        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
    </script>
</body>
</html>
